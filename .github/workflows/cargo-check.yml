name: Cargo Status Checker

on:
  schedule:
    - cron: '0 13 * * 1-6'
    - cron: '0 14 * * 1-6'
    - cron: '0 15 * * 1-6'
    - cron: '0 16 * * 1-6'
    - cron: '0 17 * * 1-6'
    - cron: '0 18 * * 1-6'
    - cron: '0 19 * * 1-6'
    - cron: '0 20 * * 1-6'
    - cron: '0 21 * * 1-6'
    - cron: '0 22 * * 1-6'
    - cron: '0 23 * * 1-6'
  workflow_dispatch:

jobs:
  check-cargo:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tracker
        run: npm install

      - name: Install Chromium for Puppeteer
        working-directory: tracker
        run: npx puppeteer browsers install chrome

      - name: Run cargo checker
        working-directory: tracker
        env:
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          VAPID_PUBLIC:  ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
        run: node cargo-checker.js

      - name: Commit updated watchlist
        run: |
          git config user.name  "Cargo Tracker Bot"
          git config user.email "actions@github.com"
          git add watchlist.json
          git diff --staged --quiet || git commit -m "chore: update watchlist [skip ci]"
          git push
