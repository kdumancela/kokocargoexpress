name: Cargo Status Checker

on:
  schedule:
    # Runs every hour Mon–Sat, 1pm–11pm UTC (= 9am–7pm ET)
    # GitHub cron: minute hour day month weekday
    - cron: '0 13 * * 1-6'  # 1pm UTC  (9am ET)
    - cron: '0 14 * * 1-6'  # 2pm UTC  (10am ET)
    - cron: '0 15 * * 1-6'  # 3pm UTC  (11am ET)
    - cron: '0 16 * * 1-6'  # 4pm UTC  (12pm ET)
    - cron: '0 17 * * 1-6'  # 5pm UTC  (1pm ET)
    - cron: '0 18 * * 1-6'  # 6pm UTC  (2pm ET)
    - cron: '0 19 * * 1-6'  # 7pm UTC  (3pm ET)
    - cron: '0 20 * * 1-6'  # 8pm UTC  (4pm ET)
    - cron: '0 21 * * 1-6'  # 9pm UTC  (5pm ET)
    - cron: '0 22 * * 1-6'  # 10pm UTC (6pm ET)
    - cron: '0 23 * * 1-6'  # 11pm UTC (7pm ET)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  check-cargo:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit watchlist.json updates back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix tracker

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run cargo checker
        env:
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          VAPID_PUBLIC:  ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
        run: node tracker/cargo-checker.js

      - name: Commit updated watchlist
        run: |
          git config user.name  "Cargo Tracker Bot"
          git config user.email "actions@github.com"
          git add watchlist.json
          git diff --staged --quiet || git commit -m "chore: update watchlist [skip ci]"
          git push
